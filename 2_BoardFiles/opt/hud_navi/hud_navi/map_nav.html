<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
  html,body{width:100%;height:100%;margin:0;padding:0;background:#000}
  #map{width:100%;height:100%}
  #hint{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);
    color:#fff;padding:6px 16px;border-radius:16px;font-size:14px;font-family:sans-serif;z-index:999}
  #bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);
    color:#fff;padding:8px 16px;font-size:13px;display:flex;justify-content:space-around;z-index:999}
</style>
<script src="https://webapi.amap.com/maps?v=1.4.15&key=e8d38aa4ccc5dd4bac424460304f900c"></script>
</head>
<body>
<div id="map"></div>
<div id="hint">地图加载中...</div>
<div id="bottom">
  <span id="spd">-- km/h</span>
  <span id="rem">--</span>
  <span id="eta">-- min</span>
</div>
<script>
if(typeof AMap === 'undefined'){
    document.getElementById("hint").textContent = "高德JS加载失败，检查网络";
    document.getElementById("hint").style.color = "#f33";
} else {
    document.getElementById("hint").textContent = "AMap OK，初始化...";

    var WEB_KEY = "6af97f35f48f772b1532efe395099ffb";
    var gpsPoint = null, destPoint = null;

    var map = new AMap.Map("map", {
        zoom: 16,
        center: [117.254286, 31.752581],
        resizeEnable: true
    });

    var selfMarker = new AMap.Marker({
        position: [117.254286, 31.752581],
        icon: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png",
        zIndex: 999
    });
    selfMarker.setMap(map);

    var routeLine = new AMap.Polyline({
        strokeColor: "#0088ff", strokeWeight: 4, strokeOpacity: 0.9
    });
    routeLine.setMap(map);

    var destMarker = new AMap.Marker({ zIndex: 998 });
    destMarker.setMap(map);

    document.getElementById("hint").textContent = "等待GPS..." + map.getCenter();

    // ═══ GPS WebSocket ═══
    function connectGPS(){
        var ws = new WebSocket("ws://127.0.0.1:8088");
        ws.onopen = function(){ console.log("GPS connected"); };
        ws.onmessage = function(e){
            var d = JSON.parse(e.data);
            gpsPoint = [d.lon, d.lat];
            map.setCenter(gpsPoint);
            selfMarker.setPosition(gpsPoint);
            document.getElementById("hint").textContent = d.lat.toFixed(5)+","+d.lon.toFixed(5);
            document.getElementById("spd").textContent = (d.speed||0).toFixed(1)+" km/h";
        };
        ws.onclose = function(){
            document.getElementById("hint").textContent = "GPS断开，5s重连...";
            setTimeout(connectGPS, 5000);
        };
    }
    connectGPS();

    // ═══ 路线规划 ═══
    window.calcRoute = async function(destLat, destLng){
        if(!gpsPoint) return;
        var url = "https://restapi.amap.com/v3/direction/walking?" +
            "origin=" + gpsPoint[0] + "," + gpsPoint[1] +
            "&destination=" + destLng + "," + destLat + "&key=" + WEB_KEY;
        var r = await fetch(url).then(function(r){return r.json()});
        if(r.status !== "1") return;
        var path = r.route.paths[0], allPts = [];
        path.steps.forEach(function(s){
            (s.polyline||"").split(";").forEach(function(p){
                var xy = p.split(",");
                if(xy.length==2) allPts.push([parseFloat(xy[0]),parseFloat(xy[1])]);
            });
        });
        routeLine.setPath(allPts);
        destPoint = [destLng, destLat];
        destMarker.setPosition(destPoint);
        map.setFitView([routeLine, selfMarker, destMarker]);
        var d = path.distance;
        document.getElementById("rem").textContent = d>1000?(d/1000).toFixed(1)+"km":d+"m";
        document.getElementById("eta").textContent = Math.round(path.duration/60)+"min";
        document.getElementById("hint").textContent = "路线: "+(d>1000?(d/1000).toFixed(1)+"km":d+"m");
    };

    console.log("HUD Map Ready");
    // 从 URL 读取目的地参数并自动规划
    var params=new URLSearchParams(window.location.search);
    var destLat=parseFloat(params.get("destLat"));
    var destLng=parseFloat(params.get("destLng"));
    if(destLat&&destLng){
        gpsPoint=[117.254286,31.752581];
        map.setCenter([117.254286,31.752581]);
        selfMarker.setPosition([117.254286,31.752581]);
        document.getElementById("hint").textContent="规划路线...";
        setTimeout(function(){ calcRoute(destLat,destLng); },1000);
    }
}
</script>
</body>
</html>
